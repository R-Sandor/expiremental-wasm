<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
  <title>Hello ImGui Extension</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      width: 800px;
      height: 600px;
      background-color: #000;
      overflow: hidden;
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: optimizeSpeed;
      image-rendering: crisp-edges;
      -ms-interpolation-mode: nearest-neighbor;
    }
    #status {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
      background: rgba(0,0,0,0.7);
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="status">Loading ImGui...</div>
  <canvas id="canvas" tabindex="-1"></canvas>

  <script src="imgui_loader.js"></script>
</body>
</html>
